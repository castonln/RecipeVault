# azure-pipelines.yml
# Continuous Deployment Pipeline for Docker-based Frontend and Backend
# Pushes images to Docker Hub and triggers Render deploy hooks

trigger:
  branches:
    include:
      - main

variables:
  - group: RecipeVault_PROD

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: BuildAndPush
    displayName: Build and Push
    steps:
      - task: DockerInstaller@0
        displayName: Install Docker
        inputs:
          dockerVersion: '24.0.6'

      - script: |
          echo "$(DOCKER_HUB_PASSWORD)" | docker login -u "$(DOCKER_HUB_USERNAME)" --password-stdin

          docker build -t $(dockerHubNamespace)/$(DotnetServerName):$(Build.BuildId) ./server
          docker build -t $(dockerHubNamespace)/$(ReactClientName):$(Build.BuildId) ./client

          docker tag $(dockerHubNamespace)/$(DotnetServerName):$(Build.BuildId) $(dockerHubNamespace)/$(DotnetServerName):latest
          docker tag $(dockerHubNamespace)/$(ReactClientName):$(Build.BuildId) $(dockerHubNamespace)/$(ReactClientName):latest

          docker push $(dockerHubNamespace)/$(DotnetServerName):$(Build.BuildId)
          docker push $(dockerHubNamespace)/$(DotnetServerName):latest

          docker push $(dockerHubNamespace)/$(ReactClientName):$(Build.BuildId)
          docker push $(dockerHubNamespace)/$(ReactClientName):latest
        displayName: Build and Push Docker Images

  - job: DeployBackend
    dependsOn: BuildAndPush
    displayName: Deploy Backend to Render
    steps:
      - script: |
          curl -X POST $(renderDeployHookBackend)
        displayName: Trigger Render Deploy Hook for Backend

  - job: DeployFrontend
    dependsOn: DeployBackend
    displayName: Deploy Frontend to Render
    steps:
      - script: |
          curl -X POST $(renderDeployHookFrontend)
        displayName: Trigger Render Deploy Hook for Frontend
